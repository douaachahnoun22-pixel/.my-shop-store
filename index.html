<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe Atelier | المتجر</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #fdfaf9; direction: rtl; }
        .header { background: white; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; padding: 40px; max-width: 1200px; margin: 0 auto; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.08); text-align: center; padding-bottom: 20px; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img { width: 100%; height: 300px; object-fit: cover; }
        .product-card h3 { margin: 15px 0 5px; font-size: 1.1rem; color: #444; }
        .price { color: #b5838d; font-size: 1.3rem; font-weight: bold; margin-bottom: 15px; }
        .buy-btn { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Luxe Atelier</h1>
        <p>مجموعة المجوهرات الراقية</p>
    </div>
    <div class="product-grid">
        <div class="product-card">
            <img src="image/1000055230.jpg" alt="سوار الحجر الوردي">
            <h3>سوار الحجر الوردي</h3>
            <p class="price">49 DH</p>
            <button class="buy-btn">أضف إلى السلة</button>
        </div>
        <div class="product-card">
            <img src="image/1000055233.jpg" alt="طقم ذهبي فاخر">
            <h3>طقم ذهبي فاخر</h3>
            <p class="price">89 DH</p>
            <button class="buy-btn">أضف إلى السلة</button>
        </div>
        <div class="product-card">
            <img src="image/1000055216.jpg" alt="سوار بتصميم مغربي">
            <h3>سوار بتصميم مغربي</h3>
            <p class="price">25 DH</p>
            <button class="buy-btn">أضف إلى السلة</button>
        </div>
        <div class="product-card">
            <img src="image/1000055223.jpg" alt="طقم السلاسل الدائرية">
            <h3>طقم السلاسل الدائرية</h3>
            <p class="price">99 DH</p>
            <button class="buy-btn">أضف إلى السلة</button>
        </div>
        <div class="product-card">
            <img src="image/1000055213.jpg" alt="خاتم وسوار ذهبي">
            <h3>خاتم وسوار ذهبي</h3>
            <p class="price">79 DH</p>
            <button class="buy-btn">أضف إلى السلة</button>
        </div>
    </div>
</body>
</html>
