<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luxury Shop | Cart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://kit.fontawesome.com/a2d9cfd84b.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="page-shell">
    <header class="site-header simple-header">
      <div class="brand-row">
        <a class="brand" href="index.html">Luxe Atelier</a>
        <nav class="nav-links">
          <a href="index.html">Home</a>
          <a href="products.html">Products</a>
          <a href="checkout.html">Checkout</a>
        </nav>
      </div>
    </header>

    <main class="section-grid cart-grid">
      <section class="cart-list soft-border">
        <div class="section-label">
          <span>Shopping Cart</span>
          <h2>Your selected pieces</h2>
        </div>
        <div id="cartItems"></div>
        <div id="emptyCart" class="empty-state">Your cart is empty. Explore our products and add your favorites.</div>
      </section>
      <aside class="cart-summary">
        <div class="summary-box soft-border">
          <h3>Order summary</h3>
          <div class="summary-row"><span>Subtotal</span><span id="subtotalValue">$0.00</span></div>
          <div class="summary-row"><span>Shipping</span><span>$12.00</span></div>
          <div class="summary-row total-row"><span>Total</span><span id="totalValue">$0.00</span></div>
          <button id="checkoutButton" class="button button-primary block">Proceed to Checkout</button>
        </div>
      </aside>
    </main>

    <footer class="site-footer simple-footer">
      <p>&copy; 2026 Luxe Atelier</p>
    </footer>
  </div>

  <div id="toast" class="toast"></div>
  <script src="js/cart.js" defer></script>
</body>
</html>
